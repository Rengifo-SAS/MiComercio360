<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradiente azul oscuro a azul -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>

    <!-- Gradiente para la caja registradora -->
    <linearGradient id="boxGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>

    <!-- Gradiente para pantalla -->
    <linearGradient id="screenGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>

    <!-- Sombra suave -->
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="12"/>
      <feOffset dx="0" dy="12" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.4"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Fondo circular con gradiente azul -->
  <circle cx="256" cy="256" r="256" fill="url(#bgGradient)"/>

  <!-- Caja registradora moderna -->
  <g filter="url(#shadow)">
    <!-- Pantalla superior de la caja -->
    <g transform="translate(256, 152)">
      <!-- Soporte de la pantalla -->
      <rect x="-12" y="0" width="24" height="48" rx="4" fill="url(#boxGradient)" opacity="0.9"/>

      <!-- Pantalla digital -->
      <rect x="-80" y="-56" width="160" height="64" rx="12" fill="url(#screenGradient)"/>

      <!-- Display LED (números) -->
      <text x="0" y="-8" font-family="monospace" font-size="40" font-weight="bold" fill="#22d3ee" text-anchor="middle">$0.00</text>
    </g>

    <!-- Cuerpo principal de la caja registradora -->
    <rect x="112" y="200" width="288" height="192" rx="24" fill="url(#boxGradient)"/>

    <!-- Borde superior oscuro -->
    <rect x="120" y="200" width="272" height="16" rx="8" fill="#1e293b" opacity="0.3"/>

    <!-- Cajón de dinero (indicador) -->
    <rect x="128" y="360" width="256" height="32" rx="8" fill="#1e293b" opacity="0.4"/>
    <circle cx="256" cy="376" r="8" fill="#64748b"/>

    <!-- Teclas del teclado numérico (3x3) -->
    <g transform="translate(168, 232)">
      <!-- Fila 1 -->
      <rect x="0" y="0" width="40" height="24" rx="6" fill="#2563eb" opacity="0.6"/>
      <rect x="56" y="0" width="40" height="24" rx="6" fill="#2563eb" opacity="0.6"/>
      <rect x="112" y="0" width="40" height="24" rx="6" fill="#2563eb" opacity="0.6"/>

      <!-- Fila 2 -->
      <rect x="0" y="36" width="40" height="24" rx="6" fill="#2563eb" opacity="0.6"/>
      <rect x="56" y="36" width="40" height="24" rx="6" fill="#2563eb" opacity="0.6"/>
      <rect x="112" y="36" width="40" height="24" rx="6" fill="#2563eb" opacity="0.6"/>

      <!-- Fila 3 -->
      <rect x="0" y="72" width="40" height="24" rx="6" fill="#2563eb" opacity="0.6"/>
      <rect x="56" y="72" width="40" height="24" rx="6" fill="#2563eb" opacity="0.6"/>
      <rect x="112" y="72" width="40" height="24" rx="6" fill="#2563eb" opacity="0.6"/>
    </g>

    <!-- Papel de recibo saliendo -->
    <g transform="translate(256, 192)">
      <rect x="-32" y="-24" width="64" height="40" rx="4" fill="white" opacity="0.95"/>
      <!-- Líneas del recibo -->
      <line x1="-24" y1="-12" x2="24" y2="-12" stroke="#94a3b8" stroke-width="2" opacity="0.5"/>
      <line x1="-24" y1="0" x2="24" y2="0" stroke="#94a3b8" stroke-width="2" opacity="0.5"/>
      <line x1="-24" y1="12" x2="16" y2="12" stroke="#94a3b8" stroke-width="2" opacity="0.5"/>
    </g>
  </g>

  <!-- Acento circular decorativo -->
  <circle cx="256" cy="256" r="240" stroke="white" stroke-width="4" fill="none" opacity="0.1"/>
  <circle cx="256" cy="256" r="224" stroke="white" stroke-width="2" fill="none" opacity="0.05"/>
</svg>
