[phases.setup]
nixPkgs = ["nodejs_22", "pnpm"]
nixLibs = ["openssl"]

[phases.install]
cmds = [
  "pnpm install --frozen-lockfile"
]

[phases.build]
cmds = [
  "pnpm run build"
]

[start]
cmd = "pnpm start"

[variables]
NODE_ENV = "production"
PORT = "3000"
RAILWAY_ENVIRONMENT = "true"