<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradiente azul oscuro a azul -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>

    <!-- Gradiente para la caja registradora -->
    <linearGradient id="boxGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>

    <!-- Gradiente para pantalla -->
    <linearGradient id="screenGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>

    <!-- Sombra suave -->
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="3" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.4"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Fondo circular con gradiente azul -->
  <circle cx="64" cy="64" r="64" fill="url(#bgGradient)"/>

  <!-- Caja registradora moderna -->
  <g filter="url(#shadow)">
    <!-- Pantalla superior de la caja -->
    <g transform="translate(64, 38)">
      <!-- Soporte de la pantalla -->
      <rect x="-3" y="0" width="6" height="12" rx="1" fill="url(#boxGradient)" opacity="0.9"/>

      <!-- Pantalla digital -->
      <rect x="-20" y="-14" width="40" height="16" rx="3" fill="url(#screenGradient)"/>

      <!-- Display LED (números) -->
      <text x="0" y="-2" font-family="monospace" font-size="10" font-weight="bold" fill="#22d3ee" text-anchor="middle">$0.00</text>
    </g>

    <!-- Cuerpo principal de la caja registradora -->
    <rect x="28" y="50" width="72" height="48" rx="6" fill="url(#boxGradient)"/>

    <!-- Borde superior oscuro -->
    <rect x="30" y="50" width="68" height="4" rx="2" fill="#1e293b" opacity="0.3"/>

    <!-- Cajón de dinero (indicador) -->
    <rect x="32" y="85" width="64" height="8" rx="2" fill="#1e293b" opacity="0.4"/>
    <circle cx="64" cy="89" r="2" fill="#64748b"/>

    <!-- Teclas del teclado numérico (3x3) -->
    <g transform="translate(42, 58)">
      <!-- Fila 1 -->
      <rect x="0" y="0" width="10" height="6" rx="1.5" fill="#2563eb" opacity="0.6"/>
      <rect x="14" y="0" width="10" height="6" rx="1.5" fill="#2563eb" opacity="0.6"/>
      <rect x="28" y="0" width="10" height="6" rx="1.5" fill="#2563eb" opacity="0.6"/>

      <!-- Fila 2 -->
      <rect x="0" y="9" width="10" height="6" rx="1.5" fill="#2563eb" opacity="0.6"/>
      <rect x="14" y="9" width="10" height="6" rx="1.5" fill="#2563eb" opacity="0.6"/>
      <rect x="28" y="9" width="10" height="6" rx="1.5" fill="#2563eb" opacity="0.6"/>

      <!-- Fila 3 -->
      <rect x="0" y="18" width="10" height="6" rx="1.5" fill="#2563eb" opacity="0.6"/>
      <rect x="14" y="18" width="10" height="6" rx="1.5" fill="#2563eb" opacity="0.6"/>
      <rect x="28" y="18" width="10" height="6" rx="1.5" fill="#2563eb" opacity="0.6"/>
    </g>

    <!-- Papel de recibo saliendo -->
    <g transform="translate(64, 48)">
      <rect x="-8" y="-6" width="16" height="10" rx="1" fill="white" opacity="0.95"/>
      <!-- Líneas del recibo -->
      <line x1="-6" y1="-3" x2="6" y2="-3" stroke="#94a3b8" stroke-width="0.5" opacity="0.5"/>
      <line x1="-6" y1="0" x2="6" y2="0" stroke="#94a3b8" stroke-width="0.5" opacity="0.5"/>
      <line x1="-6" y1="3" x2="4" y2="3" stroke="#94a3b8" stroke-width="0.5" opacity="0.5"/>
    </g>
  </g>

  <!-- Acento circular decorativo -->
  <circle cx="64" cy="64" r="60" stroke="white" stroke-width="1" fill="none" opacity="0.1"/>
  <circle cx="64" cy="64" r="56" stroke="white" stroke-width="0.5" fill="none" opacity="0.05"/>
</svg>
